name: GitHub Actions
on:
  pull_request:
    paths:
      - ".github/workflows/*.yaml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/*.yaml"
jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker://rhysd/actionlint@sha256:5acca218639222e4afbc82fc6e9ef56cbe646ade3b07f3f5ec364b638258a244 # v1.7.0
        with:
          args: -color
